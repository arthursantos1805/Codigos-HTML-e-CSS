<!DOCTYPE html>
<html lang="pr-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos com HTML5</title>
</head>
<body>
    <h1>Inserindo vídeos hospedados localmente</h1>
    <p>Este video está hospedado no meu próprio servidor</p>
    <video src="midia/meuvideo.mp4" width="500"controls></video>
    <h1>Inseridos vídeos hospedados em servidores externos</h1>
    <p>Este vídeo está hospedado no Youtube</p>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/_P9u1Kk6CmM?si=2bu0Q5MeT3Sl0kEr" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    

</body>
</html>
