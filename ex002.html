<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adcionando imagens em um documento html</title>
    
</head>
<body>
    <h1>Adcionando imagens</h1>
    <p>Abaixo você vai ver uma imagem salva nessa pasta</p>
    <img src="html5-logo.png" alt="Logo HTML5">
    <p>Podemos também carregar imagens que estão em subpastas</p>
    <img src="imagens/css3-logo.png" alt="Logo CSS3">
    <p>Também podemos carregar imagens externas</p>
    <img src="https://image.shutterstock.com/image-vector/web-development-sign-javascript-vector-260nw-1875934654.jpg" alt="Logo JavaScript">
</body>
</html>
