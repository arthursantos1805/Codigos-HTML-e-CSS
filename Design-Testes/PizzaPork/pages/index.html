<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PizzaPork - Início</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="shortcut icon" href="../images/favicon.ico" type="image/x-icon">
    <script src="https://kit.fontawesome.com/ff09a9fe3c.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>
            <div>
                <a href="#">
                <img src="../images/logo.png" alt="PizzaPork">
                </a>
                <nav id="menu">
                    <a href="#"><i class="fa-solid fa-house"></i></a>
                    <a href="#" target="_blank"><i class="fa-solid fa-book-open"></i></a>
                    <a href="#" target="_blank"><i class="fa-solid fa-cart-plus"></i></a>
                </nav>
            </div>
    </header>

    <main>
        <h1>Bem vindo!</h1>
        <p id="apresentacao">Na PizzaPork a qualidade é herança de família.</p>
        <section>
            <div id="pedido">
                <h2>FAÇA SEU PEDIDO JÁ</h2>
                <a href="#" target="_blank">Acessar Cardápio</a>
            </div>
            <form>
                <h1>Vire nosso cliente Oficial!</h1>

                <div class="campo">
                    <label for="iemail"><i class="fa-solid fa-envelope"></i></label>
                    <input class="input-campo" type="email" name="email" id="iemail" placeholder="Email">
                </div>

                <div class="campo">
                    <label for="isenha"><i class="fa-solid fa-key"></i></label>
                    <input class="input-campo" type="password" name="senha" id="isenha" placeholder="Senha">
                </div>

                <div class="campo">
                    <label for="itel"><i class="fa-solid fa-phone"></i></label>
                    <input class="input-campo" type="tel" name="tel" id="itel" placeholder="Telefone" autocomplete="tel">
                </div>

                <input id="submit" type="submit" value="Cadastrar">

                <p>Já tem uma conta? <a href="#" target="_blank">Faça login aqui.</a></p>
            </form>
        </section>
    </main>

    <footer>
        <h2>Nos contate</h2>
        <nav id="social">
            <a href="#" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
            <a href="#" target="_blank"><i class="fa-brands fa-instagram"></i></a>
            <a style="margin-left: 8px;" href="#" target="_blank"><i class="fa-solid fa-truck-fast"></i></a>
        </nav>
        <p> PizzaPork<br>
            Avenida das Palmeiras, nº 502<br>
            Jardim Europa<br>
            Campinas – SP<br>
        </p>
        <h3>@Copyright PizzaPork Co.</h3>
    </footer>
</body>
</html>
