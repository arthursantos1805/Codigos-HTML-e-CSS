<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parágrafos</title>
    <style>
        body {
            font: normal 18pt Arial;
        }
    </style>
</head>
<body>
    <h1>Parágrafos e quebras de linhas</h1>
    <hr>
    <p>Você pode escrever
        de 
        qualquer jeito
        que o html vai
        organizar
        desse jeito
    </p>
    <p>Se precisar quebrar o texto em agum lugar específico
        como esse <br>, você pode usar a tag &lt;br&gt;
    </p>
</body>
</html>
